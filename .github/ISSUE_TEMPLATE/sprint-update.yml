name: Sprint Update
description: Weekly check-in for an active sprint
title: "[update] "
labels: ["update"]
body:
  - type: markdown
    attributes:
      value: |
        One update per week per active sprint. Keep it short: three sections, five minutes to write.

  - type: input
    id: sprint_id
    attributes:
      label: Sprint ID
      placeholder: "ZAL-XX"
    validations:
      required: true

  - type: input
    id: week
    attributes:
      label: Week number
      placeholder: "1 of 3"
    validations:
      required: true

  - type: textarea
    id: shipped
    attributes:
      label: Shipped this week
      description: "Concrete output: merged PRs, demos, figures, drafts"
    validations:
      required: true

  - type: textarea
    id: blockers
    attributes:
      label: Blockers
      description: What is slowing you down and what would unblock it
    validations:
      required: false

  - type: textarea
    id: next
    attributes:
      label: Plan for next week
    validations:
      required: true

  - type: checkboxes
    id: status
    attributes:
      label: Status
      options:
        - label: On track
        - label: Slipping, will adjust scope
        - label: At risk, need help from reviewers / mentors
