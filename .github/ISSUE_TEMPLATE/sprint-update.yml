name: Sprint Update
description: Quick check-in during an active sprint. Post when you have something to say, not on a fixed calendar.
title: "[update] "
labels: ["update"]
body:
  - type: markdown
    attributes:
      value: |
        Post an update when something material changes: you shipped something, you are blocked, or scope shifted. No weekly quota.

  - type: input
    id: sprint_id
    attributes:
      label: Sprint ID
      placeholder: "ZAL-XX"
    validations:
      required: true

  - type: textarea
    id: update
    attributes:
      label: What is the update?
      description: What changed since last time? Shipped, blocked, rescoped, asking for help. One section is enough.
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: How is it going?
      options:
        - On track
        - Slipping, will adjust scope
        - Blocked, need help
        - Rescoping
    validations:
      required: true
