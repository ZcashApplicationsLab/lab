name: Sprint Writeup
description: Final writeup when a sprint ships, pauses, or is abandoned.
title: "[writeup] "
labels: ["writeup", "review-needed"]
body:
  - type: markdown
    attributes:
      value: |
        Filed when a sprint ends. Honest beats polished: if it did not ship, write that.

  - type: input
    id: sprint_id
    attributes:
      label: Sprint ID
      placeholder: "ZAL-XX"
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: Status
      options:
        - Shipped
        - Paused
        - Abandoned
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A few sentences. What you built, what it proves, or why it stopped.
    validations:
      required: true

  - type: input
    id: demo
    attributes:
      label: Where can someone see it?
      description: Repo link, demo URL, video, or "run instructions are in the repo README"
    validations:
      required: true

  - type: textarea
    id: retro
    attributes:
      label: Retro
      description: What worked, what did not, what you would do differently. Dead ends are valuable, include them.
    validations:
      required: true

  - type: textarea
    id: next_step
    attributes:
      label: What now?
      description: Your plan for the artifact. Keep building, leave as reference, apply for a grant. All fine.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        Optional extras. Fill if useful, skip if not.

  - type: textarea
    id: design
    attributes:
      label: Design notes
      description: Protocol sketch, threat model, trust assumptions, tradeoffs.
    validations:
      required: false

  - type: textarea
    id: open_questions
    attributes:
      label: Open questions
    validations:
      required: false

  - type: input
    id: reviewers
    attributes:
      label: Reviewers who signed off
      placeholder: "@handle1, @handle2"
    validations:
      required: false

  - type: textarea
    id: acknowledgements
    attributes:
      label: Acknowledgements
    validations:
      required: false
