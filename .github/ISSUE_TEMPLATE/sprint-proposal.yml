name: Sprint Proposal
description: Ready to lead a 2 to 4 week sprint? Drop the pitch. Not ready? Use the Idea template instead.
title: "[proposal] "
labels: ["proposal", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Three required fields. Everything else is optional, add what helps, skip what does not.

        If your scope is still fuzzy, use [Idea](https://github.com/ZcashApplicationsLab/lab/issues/new?template=idea.yml) instead.

        ZAL is volunteer and unfunded. Accepted proposals get a repo, a reviewer, and visibility.

  - type: textarea
    id: pitch
    attributes:
      label: Pitch
      description: What will you build, and why does it matter? A few sentences is enough.
      placeholder: "A CLI that turns an NFC passport read into a Halo2 proof of age. Today, proving age on-chain means leaking the full document. This explores a primitive that could plug into DeFi access flows."
    validations:
      required: true

  - type: textarea
    id: team
    attributes:
      label: Who is leading it?
      description: GitHub handles. Solo is fine.
      placeholder: "@alice (lead), @bob"
    validations:
      required: true

  - type: dropdown
    id: sprint_length
    attributes:
      label: How long?
      options:
        - 2 weeks
        - 3 weeks
        - 4 weeks
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        Everything below is optional. Fill in what is useful, leave the rest blank.

  - type: dropdown
    id: vertical
    attributes:
      label: Vertical
      description: Pick one if it is obvious. A maintainer can tag it later otherwise.
      options:
        - ""
        - Verifiable Credentials & Identity
        - Private Credit & Underwriting
        - Regulated Privacy & Selective Disclosure
        - Institutional Settlement & Proof of Reserve
        - RWA Attestations
        - Private Voting & DAO Governance
        - ZK Audits & Privacy-Preserving Analytics
        - Cross-cutting / tooling
    validations:
      required: false

  - type: input
    id: start_date
    attributes:
      label: Planned start
      placeholder: YYYY-MM-DD, or "whenever the repo is ready"
    validations:
      required: false

  - type: textarea
    id: next_step
    attributes:
      label: What happens after the sprint?
      description: Keep building it, apply for a grant, leave as reference. All fine.
    validations:
      required: false

  - type: textarea
    id: extras
    attributes:
      label: Anything else worth knowing?
      description: Primitives you will use, things you are cutting from scope, concerns, prior art. Drop it all here if you want, or skip.
    validations:
      required: false

  - type: checkboxes
    id: agreements
    attributes:
      label: Agreement
      options:
        - label: I agree to the Code of Conduct and will ship under Apache 2.0 unless I flag otherwise
          required: true
