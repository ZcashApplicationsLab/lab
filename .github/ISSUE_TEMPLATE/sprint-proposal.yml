name: Sprint Proposal
description: Propose a new sprint for the Zcash Applications Lab
title: "[proposal] "
labels: ["proposal", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a sprint. Read the [RUBRIC](../blob/main/RUBRIC.md) and the [narrative template](../blob/main/docs/SPRINT_PROPOSAL_TEMPLATE.md) before filling this out. Keep responses concrete — we prefer "ships a CLI that verifies X" over "explores the design space for Y".

  - type: input
    id: sprint_name
    attributes:
      label: Sprint name
      description: 5–10 words
      placeholder: "Shielded credit score oracle"
    validations:
      required: true

  - type: dropdown
    id: vertical
    attributes:
      label: Vertical
      options:
        - Verifiable Credentials & Identity
        - Private Credit & Underwriting
        - Regulated Privacy & Selective Disclosure
        - Institutional Settlement & Proof of Reserve
        - RWA Attestations
        - Private Voting & DAO Governance
        - ZK Audits & Privacy-Preserving Analytics
        - Cross-cutting / tooling
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: 2–3 sentences — the gap this closes and who feels it
    validations:
      required: true

  - type: textarea
    id: deliverable
    attributes:
      label: Deliverable
      description: One concrete artifact you will ship in 2–4 weeks
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: At least three things you will not do in this sprint
    validations:
      required: true

  - type: textarea
    id: team
    attributes:
      label: Team
      description: "Lead + contributors. Include GitHub handles, short bio, hours/week commitment."
    validations:
      required: true

  - type: dropdown
    id: sprint_length
    attributes:
      label: Sprint length
      options:
        - 2 weeks
        - 3 weeks
        - 4 weeks
    validations:
      required: true

  - type: input
    id: start_date
    attributes:
      label: Planned start date
      placeholder: YYYY-MM-DD
    validations:
      required: true

  - type: textarea
    id: primitives
    attributes:
      label: Primitives and dependencies
      description: Zcash primitives, libraries, or external services this uses
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Top risks
      description: Top three risks and how you will mitigate each
    validations:
      required: true

  - type: textarea
    id: handoff
    attributes:
      label: Handoff path
      description: Where this goes after the sprint (ZCG, ZF Grants, independent funding, archive)
    validations:
      required: true

  - type: textarea
    id: rubric_self_score
    attributes:
      label: Rubric self-score
      description: Scores 1–5 for Relevance, Feasibility, Team, Defensibility, Handoff. See RUBRIC.md.
      placeholder: |
        Relevance: 5 — <one line justification>
        Feasibility: 4 — ...
        Team: 4 — ...
        Defensibility: 4 — ...
        Handoff: 5 — ...
        Total: 22
    validations:
      required: true

  - type: textarea
    id: prior_art
    attributes:
      label: Prior art
      description: Related papers, implementations, and what you are building on vs replacing

  - type: checkboxes
    id: agreements
    attributes:
      label: Agreements
      options:
        - label: I have read the RUBRIC and scored myself honestly
          required: true
        - label: Code produced will be Apache 2.0 licensed (or I will declare otherwise in the proposal body)
          required: true
        - label: I agree to the Code of Conduct
          required: true
